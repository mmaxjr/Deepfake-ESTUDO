# Copy this file to: data/identities/<your_identity_name>/consent.yaml
# It must be filled out truthfully before training will run for that identity.
# Loaded and enforced by datasets/identity_dataset.py -> load_consent_manifest().

consent_confirmed: false   # must be explicitly set to true

# Full name (or consistent identifier) of the person whose face appears in
# the photos/video in this folder.
subject_name: ""

# Date (YYYY-MM-DD) this consent was given/recorded.
date: ""

# Free-text statement. Must make clear that the subject is either:
#   (a) the tool's operator themselves, using their own likeness, or
#   (b) a person who has explicitly and knowingly agreed to have a
#       synthetic version of their face generated by this tool for the
#       stated purpose.
# Example:
#   "I, Jane Doe, am the person in these photos and consent to my own
#    likeness being used to train this face-swap tool for a personal,
#    non-commercial project."
statement: ""
